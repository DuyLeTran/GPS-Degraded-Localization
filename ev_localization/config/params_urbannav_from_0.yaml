gps_monitor:
  ros__parameters:
    hdop_degraded_threshold: 5.0
    hdop_lost_threshold: 20.0
    hdop_good_threshold: 3.0
    sats_degraded_threshold: 4
    sats_good_threshold: 6
    hysteresis_duration_sec: 2.0
    hysteresis_recover_sec: 3.0
    hysteresis_relock_sec: 0.5
    timeout_sec: 10.0
    publish_rate_hz: 10.0
    use_sim_time: true

monocular_vio:
  ros__parameters:
    max_features: 500
    ransac_reproj_threshold: 1.0
    camera_fx: 264.9425
    camera_fy: 264.79
    camera_cx: 334.3975
    camera_cy: 183.162
    use_sim_time: true

landmark_ghost:
  ros__parameters:
    db_path: "config/landmarks_urbannav.json"
    fx: 264.9425
    fy: 264.79
    cx: 334.3975
    cy: 183.162
    cam_x: 0.0
    cam_y: 0.0
    cam_z: 1.5
    cam_roll: -1.5708
    cam_pitch: 0.0
    cam_yaw: -1.5708
    match_dist_thresh: 15.0
    use_sim_time: true

ekf_fusion:
  ros__parameters:
    # Process noise (Q diagonal) — continuous-time spectral density.
    Q: [0.1, 0.1, 0.01]

    # GPS measurement noise (R_gps diagonal) — observation uncertainty.
    R_gps: [2.5, 2.5, 0.05]

    # Landmark measurement noise (R_landmark diagonal)
    R_landmark: [1.0, 1.0]

    # GPS origin for Whampoa, Whampoa Area, Hong Kong (Start 0.0s offset)
    gps_lat0: 22.30155854
    gps_lon0: 114.19030853

    # Initial yaw in ENU frame (Start 0.0s offset)
    initial_yaw: 2.607

    # Maximum covariance diagonal value
    max_covariance: 1000.0

    # Maximum number of poses stored in the trajectory path message.
    max_path_length: 10000

    # Camera intrinsics (Monocular)
    camera_fx: 264.9425
    camera_fy: 264.79
    camera_cx: 334.3975
    camera_cy: 183.162
    use_sim_time: true

lane_detector:
  ros__parameters:
    roi_top_ratio: 0.6
    canny_low: 50
    canny_high: 150
    hough_threshold: 50
    hough_min_line_length: 50
    hough_max_line_gap: 150
    slope_min: 0.3
    slope_max: 3.0
    publish_debug_image: true
    use_sim_time: true

uturn_detector:
  ros__parameters:
    angle_threshold_deg: 150.0
    time_window_sec: 10.0
    cooldown_sec: 5.0
    use_sim_time: true

urbannav_converter:
  ros__parameters:
    gt_path: "/home/tranleduy/GPS-Degraded-Localization/data/UrbanNav_dataset/UrbanNav_whampoa_raw.txt"
    sim_gps_loss: true
    gps_loss_start_sec: 550.0
    gps_loss_duration_sec: 20.0
    use_sim_time: true
